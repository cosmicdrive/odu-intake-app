<!DOCTYPE html>
<html>
    <p>
    Intake management and workflow tracking system for One Dark Universe.
</p>
<head>
    <title>One Dark Universe Intake & Workflow System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>One Dark Universe Intake</h1>

    <form id="intakeForm">
        <label>Name:</label><br>
       <input
    type="text"
    id="name"
    placeholder="Enter your name"
>

        <label>Email:</label><br>
        <input type="email" id="email"><br><br>

        <label>What brings you here?</label><br>
        <textarea id="message"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>

    <p id="responseMessage"></p>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
<section>
    <h2>Submitted Entries</h2>
    <p id="submissionCount"></p>
    <div id="submissionsList"></div>
</section>

</body>
</html>
